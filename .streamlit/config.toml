[theme]
base = "dark"
primaryColor = "#6366f1"
backgroundColor = "#06060f"
secondaryBackgroundColor = "#0c0c1d"
textColor = "#e8e8f0"
font = "sans serif"

[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false

[browser]
gatherUsageStats = false
